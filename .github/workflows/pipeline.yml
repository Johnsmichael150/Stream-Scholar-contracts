name: Soroban Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: wasm32-unknown-unknown

    - name: Install bc for calculations
      run: |
        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get update && sudo apt-get install -y bc
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y bc
        elif command -v apk >/dev/null 2>&1; then
          sudo apk add bc
        fi

    - name: Setup Node.js for schema validation
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Validate JSON schemas
      run: |
        echo "🔍 Validating JSON schemas..."
        # Install ajv-cli for JSON schema validation
        npm install -g ajv-cli
        
        # Validate course metadata schema
        if [ -f "docs/course-metadata-standard.json" ]; then
          echo "✅ Course metadata schema found, validating..."
          ajv validate -s docs/course-metadata-standard.json -d docs/course-metadata-standard.json --spec=draft7 || {
            echo "❌ Course metadata schema validation failed"
            exit 1
          }
          echo "✅ Course metadata schema is valid"
        else
          echo "⚠️ Course metadata schema not found"
        fi

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
